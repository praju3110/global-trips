steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/roamsync-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/roamsync-backend:latest'
      - '.'

  # Step 2: Push the built image to Container Registry (GCR)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/roamsync-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/roamsync-backend:latest'

  # Step 3: Deploy the image to GCP Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'roamsync-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/roamsync-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--session-affinity'  # Crucial for pinning WebSocket connections on Cloud Run

images:
  - 'gcr.io/$PROJECT_ID/roamsync-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/roamsync-backend:latest'
